services:
  postgres:
    image: postgres:16
    container_name: quiz-postgres
    environment:
      POSTGRES_DB: quiz_app
      POSTGRES_USER: quiz_app
      POSTGRES_PASSWORD: quiz_app
    ports:
      - "5432:5432"
    volumes:
      - quiz_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz_app -d quiz_app"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  quiz_postgres_data:
