spring.application.name=quiz-backend
logging.level.org.springframework.security=DEBUG

server.port=8080
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/quiz_app}
spring.datasource.username=${DB_USERNAME:quiz_app}
spring.datasource.password=${DB_PASSWORD:quiz_app}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

app.storage.root=${APP_STORAGE_ROOT:./data/uploads}
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.gemini.generate-url=${GEMINI_GENERATE_URL:https://generativelanguage.googleapis.com/v1beta/models/${app.gemini.model}:generateContent}
app.gemini.inline-max-bytes=${GEMINI_INLINE_MAX_BYTES:20971520}
# URL + key thật được set qua biến môi trường trong run-backend.ps1 (nơi DUY NHẤT để sửa).
# Default dưới chỉ là fallback khi chạy không qua script.
app.generator.base-url=${QUESTION_GENERATOR_URL:http://localhost:8001}
app.generator.api-key=${QUESTION_GENERATOR_API_KEY:}
app.generator.timeout-seconds=${QUESTION_GENERATOR_TIMEOUT_SECONDS:300}

# JWT — đổi secret trong production thành chuỗi ngẫu nhiên >= 32 ký tự
app.jwt.secret=${JWT_SECRET:quiz-app-secret-key-change-in-production-32ch}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# HikariCP connection pool optimization
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=900000
